name: Build

on:
  push:
    branches:
      - master
      - fix/**
      - release/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          test -n "${version}"
          test -f "docs/releases/${version}.md"
          grep -F -- "- [${version}](${version}.md)" docs/releases/README.md

      - name: Build and run server GameTests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Validate Modrinth publish metadata
        shell: bash
        env:
          MODRINTH_DRY_RUN: 'true'
        run: bash .github/scripts/publish-modrinth.sh

      - name: Verify death backpack across Dedicated Server restarts
        shell: bash
        run: |
          set -euo pipefail
          marker_dir="${GITHUB_WORKSPACE}/restart-probe"
          run_dir="${GITHUB_WORKSPACE}/run/restartProbe"
          rm -rf "${marker_dir}" "${run_dir}"
          mkdir -p "${marker_dir}" "${run_dir}"
          printf 'eula=true\n' > "${run_dir}/eula.txt"
          cat > "${run_dir}/server.properties" <<'PROPERTIES'
          online-mode=false
          level-name=world
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          PROPERTIES

          for phase in seed recover verify; do
            echo "Running death-backpack Dedicated Server restart probe phase: ${phase}"
            DEADRECALL_RESTART_PROBE_PHASE="${phase}" \
            DEADRECALL_RESTART_PROBE_MARKER_DIR="${marker_dir}" \
              ./gradlew runRestartProbe --no-daemon --stacktrace \
              2>&1 | tee "restart-${phase}.log"
            test -f "${marker_dir}/${phase}.ok"
            test ! -f "${marker_dir}/${phase}.failure"
          done

      - name: Verify copper golem across Dedicated Server restarts
        shell: bash
        run: |
          set -euo pipefail
          marker_dir="${GITHUB_WORKSPACE}/copper-restart-probe"
          run_dir="${GITHUB_WORKSPACE}/run/copperRestartProbe"
          rm -rf "${marker_dir}" "${run_dir}"
          mkdir -p "${marker_dir}" "${run_dir}"
          printf 'eula=true\n' > "${run_dir}/eula.txt"
          cat > "${run_dir}/server.properties" <<'PROPERTIES'
          online-mode=false
          level-name=world
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          PROPERTIES

          for phase in seed recover verify; do
            echo "Running copper-golem Dedicated Server restart probe phase: ${phase}"
            DEADRECALL_COPPER_RESTART_PROBE_PHASE="${phase}" \
            DEADRECALL_COPPER_RESTART_PROBE_MARKER_DIR="${marker_dir}" \
              ./gradlew runCopperRestartProbe --no-daemon --stacktrace \
              2>&1 | tee "copper-restart-${phase}.log"
            test -f "${marker_dir}/${phase}.ok"
            test ! -f "${marker_dir}/${phase}.failure"
          done

      - name: Store failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-gametest-reports
          if-no-files-found: ignore
          path: |
            build.log
            restart-*.log
            copper-restart-*.log
            restart-probe/
            copper-restart-probe/
            **/build/reports/
            **/build/test-results/
            run/gametest/
            run/restartProbe/
            run/copperRestartProbe/
